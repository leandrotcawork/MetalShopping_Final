<!DOCTYPE html><html><head><meta charset=UTF-8><title>Brain 3D</title><style>body{margin:0;background:#0a0e27;color:#fff;font-family:monospace}#canvas{width:100vw;height:100vh}#header{position:absolute;top:0;padding:20px;background:rgba(10,14,39,0.9);z-index:100;color:#20B2AA}#stats{margin-left:auto;display:flex;gap:20px}#footer{position:absolute;bottom:0;padding:20px;background:rgba(10,14,39,0.9);font-size:12px;width:100%;color:#20B2AA;opacity:0.7}</style></head><body><canvas id=canvas></canvas><div id=header><h2>🧠 MetalShopping Brain 3D</h2><div id=stats><span>Nodes: 7</span><span>FPS: 60</span></div></div><div id=footer>Drag to rotate • Scroll to zoom • Click nodes • ESC to close</div><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script><script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script><script>const canvas=document.getElementById("canvas");const scene=new THREE.Scene();scene.background=new THREE.Color(0x0a0e27);const camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,1,10000);camera.position.set(0,100,300);const renderer=new THREE.WebGLRenderer({canvas,antialias:true});renderer.setSize(window.innerWidth,window.innerHeight);renderer.setPixelRatio(window.devicePixelRatio);scene.add(new THREE.AmbientLight(0xffffff,0.3));const light=new THREE.PointLight(0xffffff,2,800);light.position.set(0,150,100);scene.add(light);const controls=new THREE.OrbitControls(camera,renderer.domElement);controls.enableDamping=true;controls.dampingFactor=0.05;controls.autoRotate=true;controls.autoRotateSpeed=1.5;const nodes=[{title:"Architecture",region:"hippocampus",weight:1,x:0,y:20,z:0},{title:"Backend",region:"cortex/backend",weight:0.9,x:150,y:60,z:0},{title:"Frontend",region:"cortex/frontend",weight:0.85,x:-150,y:60,z:0},{title:"Database",region:"cortex/database",weight:0.88,x:0,y:-120,z:0},{title:"Infra",region:"cortex/infra",weight:0.8,x:0,y:160,z:-50},{title:"Conventions",region:"hippocampus",weight:0.95,x:-12,y:10,z:12},{title:"Tenant Isolation",region:"sinapses",weight:0.95,x:0,y:40,z:140}];const colors={"hippocampus":"#FFD700","cortex/backend":"#4169E1","cortex/frontend":"#9370DB","cortex/database":"#FF8C00","cortex/infra":"#808080","sinapses":"#20B2AA"};const group=new THREE.Group();scene.add(group);const meshes=[];nodes.forEach((n,i)=>{const size=4+n.weight*8;const col=new THREE.Color(colors[n.region]||"#666");const m=new THREE.Mesh(new THREE.SphereGeometry(size,32,32),new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:0.3,metalness:0.5,roughness:0.3}));m.position.set(n.x,n.y,n.z);m.userData=n;const g=new THREE.Mesh(new THREE.SphereGeometry(size*1.3,16,16),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.1,side:THREE.BackSide}));g.position.copy(m.position);group.add(m);group.add(g);meshes.push({mesh:m,glow:g,node:n});});const raycaster=new THREE.Raycaster();const mouse=new THREE.Vector2();canvas.addEventListener("click",e=>{mouse.x=(e.clientX/window.innerWidth)*2-1;mouse.y=-(e.clientY/window.innerHeight)*2+1;raycaster.setFromCamera(mouse,camera);const hits=raycaster.intersectObjects(group.children);if(hits.length>0){const n=meshes.find(m=>m.mesh===hits[0].object);if(n){const p=document.createElement("div");p.style.cssText="position:absolute;right:20px;top:100px;background:rgba(10,14,39,0.98);padding:20px;border:1px solid rgba(32,178,170,0.3);color:#20B2AA;width:300px;z-index:50";p.innerHTML="<h3>"+n.node.title+"</h3><p>"+n.node.region+"</p><p>Weight: "+n.node.weight.toFixed(2)+"</p>";document.body.appendChild(p);setTimeout(()=>p.remove(),5000)}}});let fc=0,lt=Date.now();function animate(){requestAnimationFrame(animate);controls.update();meshes.forEach((m,i)=>{m.glow.material.opacity=Math.sin(Date.now()*0.001+i*0.2)*0.1+0.1});renderer.render(scene,camera);fc++;if(Date.now()-lt>=1000){document.getElementById("stats").innerHTML="<span>Nodes: "+nodes.length+"</span><span>FPS: "+fc+"</span>";fc=0;lt=Date.now()}}animate();window.addEventListener("resize",()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight)});</script></body></html>
