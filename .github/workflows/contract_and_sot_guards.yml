name: Contract And SoT Guards

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  contract_validation:
    name: Contract Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate contracts
        shell: pwsh
        run: ./scripts/validate_contracts.ps1 -Scope all

  sdk_generation_check:
    name: SDK Generation Drift Check
    runs-on: ubuntu-latest
    needs:
      - contract_validation
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Docker availability
        id: docker_check
        shell: bash
        run: |
          if docker info > /dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Docker nao disponivel - step de geracao sera pulado"
          fi

      - name: Run generated artifact check
        if: steps.docker_check.outputs.available == 'true'
        shell: pwsh
        run: ./scripts/generate_contract_artifacts.ps1 -Target all -Check

  backend_tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs:
      - contract_validation
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work

      - name: Run server_core tests
        shell: bash
        run: go test ./apps/server_core/...

  web_quality:
    name: Web Typecheck And Build
    runs-on: ubuntu-latest
    needs:
      - contract_validation
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        shell: bash
        run: npm ci

      - name: Typecheck web
        shell: bash
        run: npm run web:typecheck

      - name: Build web
        shell: bash
        run: |
          chmod +x node_modules/.bin/esbuild || true
          chmod +x node_modules/esbuild/bin/esbuild 2>/dev/null || true
          npm run web:build

      - name: web:test (vitest)
        working-directory: apps/web
        shell: bash
        run: npm run test:ci
        env:
          CI: true

      - name: Guard - imutabilidade de generated-types
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            -- packages/generated-types/src/ \
            | grep -v "^$" \
            | wc -l)

          if [ "$CHANGED" -gt "0" ]; then
            LABELS=$(curl -s \
              -H "Authorization: Bearer ${{ github.token }}" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels" \
              | grep -o '"name":"[^"]*"' | grep -o '"codegen"' | wc -l)

            if [ "$LABELS" -eq "0" ]; then
              echo "ERRO: packages/generated-types/src/ modificado manualmente."
              echo "Arquivos alterados:"
              git diff --name-only origin/${{ github.base_ref }}...HEAD -- packages/generated-types/src/
              echo "Se e resultado de regeneracao, adicione label 'codegen' ao PR."
              echo "Se e edicao manual, reverta - generated-types e output-only."
              exit 1
            fi
          fi

      - name: SDK boundary checks
        shell: bash
        run: |
          grep -r "fetch(" packages/ apps/ \
            --include="*.ts" --include="*.tsx" \
            | grep -v "node_modules" \
            | grep -v "generated" \
            && echo "ERRO: fetch manual encontrado fora de sdk-runtime" && exit 1 || true

          grep -r "'/api/\|\"/api/" packages/ apps/ \
            --include="*.ts" --include="*.tsx" \
            | grep -v "node_modules" \
            | grep -v "generated" \
            && echo "ERRO: rota hardcoded encontrada" && exit 1 || true

      - name: Guard - deep relative import no runtime
        shell: bash
        run: |
          COUNT=$(grep -rn "\.\./.*generated" \
            packages/platform-sdk/src \
            --include="*.ts" \
            | grep -v "node_modules" \
            | wc -l)
          if [ "$COUNT" -gt "0" ]; then
            echo "ERRO: deep relative import encontrado em platform-sdk:"
            grep -rn "\.\./.*generated" packages/platform-sdk/src --include="*.ts"
            exit 1
          fi

      - name: Guard - as unknown as nao documentado no runtime
        shell: bash
        run: |
          COUNT=$(grep -rn "as unknown as" \
            packages/platform-sdk/src \
            --include="*.ts" \
            | grep -v "// SAFE:" \
            | wc -l)
          if [ "$COUNT" -gt "0" ]; then
            echo "ERRO: cast nao documentado em platform-sdk/src:"
            grep -rn "as unknown as" packages/platform-sdk/src --include="*.ts" | grep -v "// SAFE:"
            exit 1
          fi

  sot_doc_drift:
    name: SoT Doc Drift Guard
    runs-on: ubuntu-latest
    needs:
      - contract_validation
      - sdk_generation_check
      - backend_tests
      - web_quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        shell: bash
        run: git fetch origin "${{ github.base_ref }}" --depth=1

      - name: Check SoT drift against base branch
        shell: pwsh
        run: |
          $baseRef = "origin/${{ github.base_ref }}"
          ./scripts/check_sot_doc_drift.ps1 -BaseRef $baseRef -SkipWorkingTree
