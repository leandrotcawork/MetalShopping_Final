openapi: 3.1.0
info:
  title: "Shopping Operational API"
  version: "v1"
  summary: "Operational shopping price monitoring read surface"
  description: >
    Backend-owned Shopping API for thin clients.
    Python worker writes snapshots to Postgres, Go reads and exposes the operational surface.
  x-metalshopping:
    contract_name: "shopping_v1"
    contract_status: "draft"
    bounded_context: "shopping"
    owner_team: "product_core"
servers:
  - url: https://api.metalshopping.local
paths:
  /api/v1/shopping/bootstrap:
    get:
      operationId: getShoppingBootstrap
      summary: "Get shopping workflow bootstrap data"
      responses:
        "200":
          description: "Bootstrap returned"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/shopping_bootstrap_v1.schema.json"
        "401":
          description: "Authentication required"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/common_error_v1.schema.json"
        "403":
          description: "Tenant context required"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/common_error_v1.schema.json"
        "500":
          description: "Internal server failure"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/common_error_v1.schema.json"
  /api/v1/shopping/summary:
    get:
      operationId: getShoppingSummary
      summary: "Get shopping operational summary"
      responses:
        "200":
          description: "Summary returned"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/shopping_summary_v1.schema.json"
        "401":
          description: "Authentication required"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/common_error_v1.schema.json"
        "403":
          description: "Tenant context required"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/common_error_v1.schema.json"
        "500":
          description: "Internal server failure"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/common_error_v1.schema.json"
  /api/v1/shopping/runs:
    post:
      operationId: createShoppingRunRequest
      summary: "Create a shopping run request (queued for worker execution)"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../jsonschema/shopping_create_run_request_v1.schema.json"
      responses:
        "201":
          description: "Run request created"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/shopping_create_run_response_v1.schema.json"
        "400":
          description: "Validation failure"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/common_error_v1.schema.json"
        "401":
          description: "Authentication required"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/common_error_v1.schema.json"
        "403":
          description: "Tenant context required"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/common_error_v1.schema.json"
        "500":
          description: "Internal server failure"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/common_error_v1.schema.json"
    get:
      operationId: listShoppingRuns
      summary: "List shopping runs"
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [queued, running, completed, failed]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: "Runs list returned"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/shopping_run_list_v1.schema.json"
        "401":
          description: "Authentication required"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/common_error_v1.schema.json"
        "403":
          description: "Tenant context required"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/common_error_v1.schema.json"
        "500":
          description: "Internal server failure"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/common_error_v1.schema.json"
  /api/v1/shopping/runs/{run_id}:
    get:
      operationId: getShoppingRun
      summary: "Get shopping run detail"
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "Run detail returned"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/shopping_run_v1.schema.json"
        "401":
          description: "Authentication required"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/common_error_v1.schema.json"
        "403":
          description: "Tenant context required"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/common_error_v1.schema.json"
        "404":
          description: "Run not found"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/common_error_v1.schema.json"
        "500":
          description: "Internal server failure"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/common_error_v1.schema.json"
  /api/v1/shopping/products/{product_id}/latest:
    get:
      operationId: getShoppingProductLatest
      summary: "Get latest observed shopping price snapshot for a product"
      parameters:
        - name: product_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "Latest product snapshot returned"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/shopping_product_latest_v1.schema.json"
        "401":
          description: "Authentication required"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/common_error_v1.schema.json"
        "403":
          description: "Tenant context required"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/common_error_v1.schema.json"
        "404":
          description: "Snapshot not found"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/common_error_v1.schema.json"
        "500":
          description: "Internal server failure"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/common_error_v1.schema.json"
  /api/v1/shopping/run-requests/{run_request_id}:
    get:
      operationId: getShoppingRunRequest
      summary: "Get shopping run request status"
      parameters:
        - name: run_request_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Run request returned"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/shopping_run_request_v1.schema.json"
        "401":
          description: "Authentication required"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/common_error_v1.schema.json"
        "403":
          description: "Tenant context required"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/common_error_v1.schema.json"
        "404":
          description: "Run request not found"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/common_error_v1.schema.json"
        "500":
          description: "Internal server failure"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/common_error_v1.schema.json"
  /api/v1/shopping/supplier-signals:
    get:
      operationId: listShoppingSupplierSignals
      summary: "List persisted supplier product signals"
      parameters:
        - name: supplier_code
          in: query
          required: false
          schema:
            type: string
        - name: product_id
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: "Signals list returned"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/shopping_supplier_signal_list_v1.schema.json"
        "401":
          description: "Authentication required"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/common_error_v1.schema.json"
        "403":
          description: "Tenant context required"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/common_error_v1.schema.json"
        "500":
          description: "Internal server failure"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/common_error_v1.schema.json"
    put:
      operationId: upsertShoppingSupplierSignal
      summary: "Create or update persisted supplier product signal"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../jsonschema/shopping_upsert_supplier_signal_request_v1.schema.json"
      responses:
        "200":
          description: "Signal upserted"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/shopping_supplier_signal_v1.schema.json"
        "400":
          description: "Validation failure"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/common_error_v1.schema.json"
        "401":
          description: "Authentication required"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/common_error_v1.schema.json"
        "403":
          description: "Tenant context required"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/common_error_v1.schema.json"
        "500":
          description: "Internal server failure"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/common_error_v1.schema.json"
  /api/v1/shopping/manual-url-candidates:
    get:
      operationId: listShoppingManualUrlCandidates
      summary: "List catalog candidates with manual URL overlay for one supplier"
      parameters:
        - name: supplier_code
          in: query
          required: true
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: brand_name
          in: query
          required: false
          schema:
            type: string
        - name: taxonomy_leaf0_name
          in: query
          required: false
          schema:
            type: string
        - name: include_existing
          in: query
          required: false
          schema:
            type: boolean
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: "Candidates list returned"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/shopping_manual_url_candidate_list_v1.schema.json"
        "400":
          description: "Validation failure"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/common_error_v1.schema.json"
        "401":
          description: "Authentication required"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/common_error_v1.schema.json"
        "403":
          description: "Tenant context required"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/common_error_v1.schema.json"
        "500":
          description: "Internal server failure"
          content:
            application/json:
              schema:
                $ref: "../jsonschema/common_error_v1.schema.json"
components:
  schemas: {}
